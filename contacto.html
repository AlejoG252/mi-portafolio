<!DOCTYPE html>
<html lang="en">
    <link rel="icon" type="image/png" href="images/logo1.png">
        <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Contacto</title>

        <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

        </head>

        <body class="bg-gray-900 text-white">

         <nav class="bg-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">

                <div class="flex items-center">

                    <img class="h-12 w-12"
                        src="images/logo1.png"
                        alt="logo">

                    <div class="ml-10 flex items-baseline space-x-4">

                        <a href="index.html" class="px-3 py-2 rounded-md text-sm font-medium text-white bg-gray-900">
                            Menu
                        </a>
                        <a href="contacto.html" class="px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-700">
                            Contacto
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </nav>


        <div class="max-w-3xl mx-auto text-center mt-20">

        <h1 class="text-4xl font-bold mb-6">
        Contacto
        </h1>

        <p class="text-gray-400 mb-10">
        Podés contactarme para proyectos o preguntas.
        </p>

        <form class="space-y-4">

        <input type="text"
        placeholder="Tu nombre"
        class="w-full p-3 rounded text-black">

        <input type="email"
        placeholder="Tu email"
        class="w-full p-3 rounded text-black">

        <textarea
        placeholder="Tu mensaje"
        rows="5"
        class="w-full p-3 rounded text-black"></textarea>

        <button
        class="bg-blue-600 px-6 py-3 rounded hover:bg-blue-700">
        Enviar mensaje
        </button>

        </form>

        </div>
        <link rel="stylesheet" href="style.css">
        </body>
</html>
